<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charades Flip</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Charades">
    
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body onclick="tapScreen()">
    
    <div id="landscape-warning">
        <h2>Rotate Phone to Forehead! 🔄</h2>
    </div>

    <h1>Charades Flip</h1>
    
    <div id="hud" style="display: none;">
        <div class="stat-box">TIME: <span id="time">60</span></div>
        <div class="stat-box">SCORE: <span id="score">0</span></div>
    </div>

    <h2 id="word-display">Ready to play?</h2>
    
    <button id="start-btn" onclick="startGame(event)">Start Game</button>

    <script src="script.js?v=7"></script>
</body>
</html>
